spring:
  application:
    name: robot-monitor-backend

  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:mysql://localhost:3306/robot_monitor?useSSL=false&serverTimezone=Asia/Seoul}
    username: ${SPRING_R2DBC_USERNAME:root}
    password: ${SPRING_R2DBC_PASSWORD:1234}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 8080

logging:
  level:
    com:
      example: DEBUG
    reactor:
      core: INFO
      netty: INFO
    io.asyncer.r2dbc.mysql: DEBUG