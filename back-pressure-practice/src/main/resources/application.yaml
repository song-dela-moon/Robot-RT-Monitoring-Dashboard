spring:
  application:
    name: robot-monitor-backend

  r2dbc:
    url: r2dbc:mysql://localhost:3306/robot_monitor?useSSL=false&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always


logging:
  level:
    com:
      example: DEBUG
    reactor:
      core: INFO
      netty: INFO
    io.asyncer.r2dbc.mysql: DEBUG