version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: robot-mysql
    restart: always
    environment:
      MYSQL_DATABASE: robot_monitor
      MYSQL_USER: ${DB_USER:-robot_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-1234}
    ports:
      - "8206:3306"
    volumes:
      - robot_mysql_data:/var/lib/mysql
    networks:
      - robot-network

  nginx:
    image: nginx:alpine
    container_name: robot-nginx
    restart: always
    ports:
      - "8200:80"
    volumes:
      - /opt/robot_deploy/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - robot-network

  sonar-db:
    image: postgres:15
    container_name: robot-sonar-db
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      POSTGRES_DB: sonarqube
    ports:
      - "8207:5432"
    volumes:
      - robot_sonar_db_data:/var/lib/postgresql/data
    networks:
      - robot-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: robot-sonar-qube
    restart: always
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://robot-sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    ports:
      - "8208:9000"
    volumes:
      - robot_sonarqube_data:/opt/sonarqube/data
      - robot_sonarqube_extensions:/opt/sonarqube/extensions
      - robot_sonarqube_logs:/opt/sonarqube/logs
    networks:
      - robot-network

volumes:
  robot_mysql_data:
  robot_sonar_db_data:
  robot_sonarqube_data:
  robot_sonarqube_extensions:
  robot_sonarqube_logs:

networks:
  robot-network:
    external: true
