version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: robot-jenkins
    restart: unless-stopped
    privileged: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: root
    ports:
      - "18080:8080"
      - "20050:50000"
    volumes:
      - robot_jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /opt/robot_deploy:/opt/robot_deploy
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - robot-network

volumes:
  robot_jenkins_home:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/robot_jenkins/home

networks:
  robot-network:
    external: true
